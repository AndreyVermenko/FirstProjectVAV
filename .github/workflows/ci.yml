name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  test:
    name: Юнит-тесты игровой логики
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Установка Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Запуск тестов
        run: node --test
